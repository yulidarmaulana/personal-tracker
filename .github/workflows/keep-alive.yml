name: Supabase Keep Alive

on:
  schedule:
    # Berjalan setiap 2 hari sekali pada jam 00:00 UTC
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Mengaktifkan tombol "Run workflow" di GitHub Actions UI

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive request
        run: |
          curl --fail -I -X GET "${{ secrets.PUBLIC_SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}"
